<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Forms</title>
</head>

<body>

    <div class="container-fluid justify-content-center">
        <div class="container mt-5">
            <div class="card ">
                <div class="card-header">
                    <h3 class="">Payment form example</h3>
                </div>
                <div class="card-body">
                    <div>
                        <div class="alert alert-danger mb-4 py-2" role="alert">
                            Some fields are missing
                        </div>
                        <div class="row">
                            <fieldset class="mb-3 col-5 ">
                                <label for="card">Card #</label>
                                <input type="text" class="form-control mt-1" id="card" placeholder="XXXXXXXXXXXXXXXX">
                            </fieldset>
                            <fieldset class="mb-3 col-3">
                                <label for="cvc">CVC #</label>
                                <input type="number" class="form-control mt-1" id="cvc" placeholder="0000">

                            </fieldset>

                            <fieldset class="mb-3 col-4">
                                <label for="amount">Amount</label>
                                <div class="input-group">
                                    <span class="me-2">$</span>
                                    <input type="text" class="form-control" id="amount" placeholder="Amount">
                                </div>
                            </fieldset>
                        </div>
                    </div>
                    <!-------------------->
                    <div class="row">
                        <div class="col-sm-6 col-md-6">
                            <fieldset class=" mb-4 col-12">
                                <label for="first" class="mb-2">First Name</label>
                                <input type=" text" class="form-control w-100" id="first" placeholder="">
                            </fieldset>

                            <fieldset class="mb-3 col-12">
                                <label for="first" class="mb-2">City</label>
                                <input type=" text" class="form-control w-100" id="first" placeholder="">
                            </fieldset>
                            We accept:
                            <div class="d-flex mt-3">
                                <div class="input-group w-auto">
                                    <div class="input-group-text border-0 bg-secondary">
                                        <input class="form-check-input mt-0" type="radio" value=""
                                            aria-label="Radio button for following text input">
                                    </div>

                                    <span class="input-group-text bg-secondary border-0 rounded-0">
                                        <i class="fa-brands fa-cc-mastercard"
                                            style="color: rgb(239, 239, 239); font-size: 1.5em;"></i>
                                    </span>
                                </div>

                                <div class="input-group w-auto">
                                    <div class="input-group-text border-0 bg-secondary rounded-0">
                                        <input class="form-check-input mt-0" type="radio" value=""
                                            aria-label="Radio button for following text input">
                                    </div>
                                    <span class="input-group-text bg-secondary border-0 rounded-0">
                                        <i class="fa-brands fa-cc-visa"
                                            style="color: rgb(239, 239, 239); font-size: 1.5em;"></i>
                                    </span>
                                </div>

                                <div class="input-group w-auto">
                                    <div class="input-group-text border-0 bg-secondary rounded-0">
                                        <input class="form-check-input mt-0" type="radio" value=""
                                            aria-label="Radio button for following text input">
                                    </div>
                                    <span class="input-group-text bg-secondary border-0 rounded-0">
                                        <i class="fa-brands fa-cc-diners-club"
                                            style="color: rgb(239, 239, 239); font-size: 1.5em;"></i>
                                    </span>
                                </div>

                                <div class="input-group w-auto">
                                    <div class="input-group-text border-0 bg-secondary rounded-0">
                                        <input class="form-check-input mt-0" type="radio" value=""
                                            aria-label="Radio button for following text input">
                                    </div>
                                    <span class="input-group-text bg-secondary border-0">
                                        <i class="fa-brands fa-cc-paypal"
                                            style="color: rgb(239, 239, 239); font-size: 1.5em;"></i>
                                    </span>
                                </div>
                            </div>
                        </div>
                        <!-------------------------------->
                        <div class="col-6 col-md-6">
                            <fieldset class="mb-4 col-12 ">
                                <label for="first" class="mb-2">Last Name</label>
                                <input type=" text" class="form-control w-100" id="first" placeholder="">
                            </fieldset>

                            <div class="row">
                                <fieldset class="mb-3 col-6">
                                        <label for="first" class="form-label mb-2">Postal Code</label>
                                        <select class="form-select" id="first">
                                            <option selected>Choose...</option>
                                            <option value="1">One</option>
                                        </select>
                                </fieldset>
                                <fieldset class="mb-3 col-6">
                                    <label for="first" class="mb-2">Postal Code</label>
                                    <input type=" text" class="form-control w-100" id="first" placeholder="">
                                </fieldset>
                            </div>
                            <fieldset>
                                <label class="form-label">Caption:</label>
                                <textarea class="form-control" style="height: 100px;" placeholder=""></textarea>
                            </fieldset>
                        </div>
                    </div>
                </div>
                <div class="card-footer text-body-secondary d-flex justify-content-end ">
                    <div class="gab-3">
                        <a href="#" class="btn btn-secondary">Cancel</a>
                        <a href="#" class="btn btn-primary">Send</a>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>

    <script src="https://kit.fontawesome.com/e8096444b9.js" crossorigin="anonymous"></script>
</body>

</html>
